name: Build Kernel A235F KSU-Next
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Environment & Toolchain
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential bc bison flex libssl-dev clang lld gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi make git python2
        sudo ln -sf /usr/bin/python2 /usr/bin/python

    - name: Manual Inject KernelSU-Next
      run: |
        # 1. bersihkan folder lama jika ada
        rm -rf KernelSU-Next drivers/kernelsu
        
        # 2. clone repo ksu-next (menggunakan branch default/main)
        git clone --depth 1 https://github.com/KernelSU-Next/KernelSU-Next
        
        # 3. pindahkan isi folder kernel ke drivers/kernelsu agar path Kconfig sesuai standar
        cp -r KernelSU-Next/kernel drivers/kernelsu
        
        # 4. hapus sisa suntikan lama di Kconfig dan Makefile untuk mencegah duplikasi
        sed -i '/kernelsu/d' drivers/Kconfig
        sed -i '/kernelsu/d' drivers/Makefile
        
        # 5. suntik baris source ke drivers/Kconfig setelah baris pertama
        sed -i '2i source "drivers/kernelsu/Kconfig"' drivers/Kconfig
        
        # 6. tambahkan objek kernelsu ke drivers/Makefile
        echo "obj-y += kernelsu/" >> drivers/Makefile
        
        echo "[+] manual injection ksu-next success"

    - name: Build Kernel (Samsung A235F)
      run: |
        export ARCH=arm64
        # pastikan folder output dan dts tersedia
        mkdir -p out/arch/arm64/boot/dts
        
        # bersihkan environment sebelum build
        make -C $(pwd) O=$(pwd)/out mrproper
        
        # buat konfigurasi dari defconfig samsung a23
        make -C $(pwd) O=$(pwd)/out DTC_EXT=$(pwd)/tools/dtc CONFIG_BUILD_ARM64_DT_OVERLAY=y CLANG_TRIPLE=aarch64-linux-gnu- a23_eur_open_defconfig
        
        # proses kompilasi inti
        make -j$(nproc --all) -C $(pwd) O=$(pwd)/out DTC_EXT=$(pwd)/tools/dtc CONFIG_BUILD_ARM64_DT_OVERLAY=y CLANG_TRIPLE=aarch64-linux-gnu- CC=clang CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi-

    - name: Upload Hasil Kernel Image
      uses: actions/upload-artifact@v4
      with:
        name: Kernel-A235F-KSUNext
        path: out/arch/arm64/boot/Image
